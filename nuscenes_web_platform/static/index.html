<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NuScenes 本地数据平台</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="图层与通道">
      <div class="brand">NuScenes</div>
      <section class="nav-group">
        <h3 class="nav-h">传感器</h3>
        <p class="hint">勾选显示；未选为黑底</p>
        <div id="chk-cams" class="chk-list"></div>
        <label class="chk-row">
          <input type="checkbox" id="chk-lidar" checked />
          <span>LiDAR BEV</span>
        </label>
      </section>
      <section class="nav-group">
        <h3 class="nav-h">真值叠加</h3>
        <p class="hint">可与传感器同时开启</p>
        <label class="chk-row">
          <input type="checkbox" id="chk-gt-lidar" />
          <span>LiDAR BEV 上 3D 框</span>
        </label>
        <label class="chk-row">
          <input type="checkbox" id="chk-gt-cam" />
          <span>相机上投影 3D 框</span>
        </label>
      </section>
    </aside>
    <main class="main">
      <header class="toolbar">
        <label>场景
          <select id="scene-select"></select>
        </label>
        <label class="grow">类别筛选（搜索）
          <input id="category-input" type="text" placeholder="如 vehicle.car" list="cat-list" />
          <datalist id="cat-list"></datalist>
        </label>
        <button type="button" id="btn-search">搜索样本</button>
        <button type="button" id="btn-load-clip">加载片段</button>
        <label>步长 <input id="clip-step" type="number" min="1" max="20" value="2" class="num" /></label>
        <label>最大帧 <input id="clip-max" type="number" min="1" max="200" value="40" class="num" /></label>
        <button type="button" id="btn-play" disabled>播放</button>
        <button type="button" id="btn-stop" disabled>停止</button>
      </header>
      <div class="panels">
        <section class="panel results">
          <h2>结果 <span id="results-meta"></span></h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>场景</th><th>时间戳</th><th>sample</th></tr></thead>
              <tbody id="results-body"></tbody>
            </table>
          </div>
          <div class="pager">
            <button type="button" id="page-prev">上一页</button>
            <span id="page-label"></span>
            <button type="button" id="page-next">下一页</button>
          </div>
        </section>
        <section class="panel viewer">
          <h2>可视化</h2>
          <div id="sample-summary" class="muted"></div>
          <div id="playback-bar" class="playback-bar muted hidden"></div>
          <div class="viewer-body">
            <div class="viewer-visual">
              <div id="cam-grid" class="cam-grid" aria-label="六路相机"></div>
              <div id="lidar-slot" class="lidar-slot">
                <div class="lidar-cap">LiDAR BEV</div>
                <img id="img-lidar" alt="LiDAR BEV" />
              </div>
            </div>
            <div class="viewer-side">
              <h3>定位 ego_pose</h3>
              <pre id="ego-json" class="json"></pre>
              <h3>轨迹 (world x–y)</h3>
              <div id="ego-trail-wrap" class="ego-trail-wrap">
                <svg id="ego-trail-svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet"></svg>
              </div>
              <h3>3D 标注摘要</h3>
              <div id="ann-short" class="muted"></div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>
  <script src="/assets/app.js" type="module"></script>
</body>
</html>
